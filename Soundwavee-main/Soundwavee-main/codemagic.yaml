workflows:
  build_android:
    name: Build Android APK
    environment:
      vars:
        NODE_VERSION: "18"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build PWA
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync android
      - name: Build APK
        script: cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
